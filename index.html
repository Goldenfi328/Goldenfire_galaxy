<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golden Fire Galaxy - Luxury Watches</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:#0a0a0a;color:#fff}
    header{background:linear-gradient(135deg,#d4af37,#b8860b);padding:20px;text-align:center;position:sticky;top:0;z-index:100}
    header h1{font-size:28px;font-weight:800;letter-spacing:2px}
    .cart-btn{position:absolute;right:20px;top:20px;background:#000;color:#d4af37;border:2px solid #d4af37;padding:10px 15px;border-radius:50px;cursor:pointer;font-weight:700}
    .cart-count{background:#fff;color:#000;border-radius:50%;padding:2px 7px;margin-left:5px}
    .container{max-width:1200px;margin:0 auto;padding:20px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;margin-top:30px}
    .card{background:#1a1a1a;border-radius:15px;overflow:hidden;border:1px solid #333;transition:.3s}
    .card:hover{transform:translateY(-5px);border-color:#d4af37}
    .card img{width:100%;height:250px;object-fit:cover}
    .card-body{padding:15px}
    .card h3{color:#d4af37;font-size:18px;min-height:45px}
    .price{font-size:22px;font-weight:800;color:#fff;margin:10px 0}
    .btn{background:#d4af37;color:#000;border:none;padding:12px;width:100%;border-radius:8px;font-weight:700;cursor:pointer}
    .btn:hover{background:#b8860b}
    .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center}
    .modal.active{display:flex}
    .modal-content{background:#1a1a1a;padding:25px;border-radius:15px;max-width:500px;width:90%;border:2px solid #d4af37;max-height:80vh;overflow-y:auto}
    .close{float:right;cursor:pointer;font-size:24px;color:#d4af37}
    footer{text-align:center;padding:30px;margin-top:50px;border-top:1px solid #333;color:#888}
  </style>
</head>
<body>
  <header><h1>GOLDEN FIRE GALAXY</h1><button class="cart-btn" onclick="openCart()">Cart <span class="cart-count" id="cartCount">0</span></button></header>
  <div class="container"><div class="grid" id="productGrid"></div></div>
  <div class="modal" id="cartModal"><div class="modal-content"><span class="close" onclick="closeCart()">&times;</span><h2 style="color:#d4af37">Your Cart</h2><div id="cartItems"></div><h3>Total: ₦<span id="cartTotal">0</span></h3><button class="btn" onclick="checkoutWhatsApp()">Checkout via WhatsApp</button></div></div>
  <footer><p>© 2026 Golden Fire Galaxy | Port Harcourt, Nigeria | WhatsApp: 08021254993</p></footer>
<script>
const products = [
  {id:1,name:"Rolex Submariner Gold",price:85000,img:"https://images.unsplash.com/photo-1523170335258-f5ed11844a49?w=500"},
  {id:2,name:"Omega Seamaster Pro",price:75000,img:"https://images.unsplash.com/photo-1524805444758-089113d48a6d?w=500"},
  {id:3,name:"Audemars Piguet Royal Oak",price:95000,img:"https://images.unsplash.com/photo-1539874754764-5a96559165b0?w=500"},
  {id:4,name:"Patek Philippe Nautilus",price:120000,img:"https://images.unsplash.com/photo-1508296695146-2579035a7d1c?w=500"},
  {id:5,name:"Cartier Santos Gold",price:68000,img:"https://images.unsplash.com/photo-1548169874-53e85f753f1e?w=500"},
  {id:6,name:"Tag Heuer Monaco",price:55000,img:"https://images.unsplash.com/photo-1612817159949-195b6eb9e31a?w=500"},
  {id:7,name:"Breitling Navitimer",price:62000,img:"https://images.unsplash.com/photo-1622434641406-a158f72042be?w=500"},
  {id:8,name:"IWC Portugieser",price:78000,img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=500"},
  {id:9,name:"Hublot Big Bang",price:90000,img:"https://images.unsplash.com/photo-1557538869-29f7b6f03f6a?w=500"},
  {id:10,name:"Panerai Luminor",price:82000,img:"https://images.unsplash.com/photo-1533139502658-0198f920d8e8?w=500"},
  {id:11,name:"Vacheron Constantin",price:110000,img:"https://images.unsplash.com/photo-1594576728792-68f800c158da?w=500"},
  {id:12,name:"Jaeger-LeCoultre",price:88000,img:"https://images.unsplash.com/photo-1611591437281-460bfbe1220a?w=500"},
  {id:13,name:"Richard Mille RM11",price:150000,img:"https://images.unsplash.com/photo-1509048191080-d2984bad6ae5?w=500"},
  {id:14,name:"Zenith Defy El Primero",price:65000,img:"https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=500"},
  {id:15,name:"Longines Master",price:42000,img:"https://images.unsplash.com/photo-1565814329452-e1efa11c5b89?w=500"},
  {id:16,name:"Tissot PRX Gold",price:38000,img:"https://images.unsplash.com/photo-1587836374828-4dbafa94cf0f?w=500"},
  {id:17,name:"Seiko Presage",price:32000,img:"https://images.unsplash.com/photo-1594534475808-f8f8b14efbb4?w=500"},
  {id:18,name:"Citizen Eco-Drive",price:28000,img:"https://images.unsplash.com/photo-1589388488888-d3d8d5a06e45?w=500"},
  {id:19,name:"Rado Centrix",price:45000,img:"https://images.unsplash.com/photo-1548169874-53e85f753f1e?w=500"},
  {id:20,name:"Montblanc Heritage",price:52000,img:"https://images.unsplash.com/photo-1639778332501-c8559f50759e?w=500"}
];
let cart = [];
function renderProducts(){document.getElementById('productGrid').innerHTML = products.map(p=>`<div class="card"><img src="${p.img}" alt="${p.name}"><div class="card-body"><h3>${p.name}</h3><div class="price">₦${p.price.toLocaleString()}</div><button class="btn" onclick="addToCart(${p.id})">Add to Cart</button></div></div>`).join('');}
function addToCart(id){cart.push(products.find(p=>p.id===id));document.getElementById('cartCount').innerText = cart.length;alert('Added to cart');}
function openCart(){document.getElementById('cartModal').classList.add('active');const total = cart.reduce((sum,i)=>sum+i.price,0);document.getElementById('cartTotal').innerText = total.toLocaleString();document.getElementById('cartItems').innerHTML = cart.length===0?'<p>Cart is empty</p>':cart.map(i=>`<p>${i.name} - ₦${i.price.toLocaleString()}</p>`).join('');}
function closeCart(){document.getElementById('cartModal').classList.remove('active');}
function checkoutWhatsApp(){if(cart.length===0){alert('Cart is empty');return;}const total = cart.reduce((sum,i)=>sum+i.price,0);const items = cart.map(i=>`- ${i.name}`).join('%0A');window.open(`https://wa.me/2348021254993?text=Hello Golden Fire Galaxy%0AOrder:%0A${items}%0ATotal: ₦${total}`,'_blank');}
renderProducts();
</script>
</body>
</html>
